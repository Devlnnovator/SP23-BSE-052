<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sana_safinaz</title>
    <link rel="stylesheet" href="next.css" >

</head>
<body>
   <header>
    <div class="up">
        <p>
        In Pakistan, a flat fee of PKR 190 will be charged on all orders | Free International Shipping Above USD 300 (T$C Apply)-UAN/WhatsApp:021-111-003-005
        </p>
        </div>
    <div class="navbar">
        <div class="menu">
        <i class="fa-solid fa-bars"></i>
        </div>
        <div class="logo1">
            <img src="/sana_fb.webp" alt="pic">

        </div>
        <div class="other">
            <div class="icon-with-text">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span>Search</span>
            </div>

            <div class="dropdown">
                <img src="/flag_us.webp" alt="Dropdown Icon" class="dropdown-icon">
                <div class="dropdown-content">
                    <a href="#"><img src="/flag_us.webp" alt="Image 1" class="dropdown-image"></a>
                    <a href="#"><img src="/flag2.webp" alt="Image 2" class="dropdown-image"></a>
                    <a href="#"><img src="/flag5.webp" alt="Image 3" class="dropdown-image"></a>
                    <a href="#"><img src="/flag6.webp" alt="Image 4" class="dropdown-image"></a>
                    <a href="#"><img src="/flg4.webp" alt="Image 5" class="dropdown-image"></a>
                </div>
            </div>

            <div class="icon-with-text whatsapp-icon">
               
                <i class="fa-brands fa-whatsapp"></i>
                <span>WhatsApp</span>
                
            </div>

            <div class="icon-with-text">
                <i class="fa-solid fa-truck-fast"></i>
                <span>Track</span>
            </div>

            <div class="icon-with-text">
                <i class="fa-regular fa-user"></i>
                <span>Account</span>
            </div>

            
            <div class="icon-with-text">
              <i class="fa-solid fa-cart-shopping" id="cartButton"></i>
                <span>MyCart</span>
            </div>
        </div>

    </div>
</header>

<div id="checkoutModal" class="modal"> <!-- Label: Modal container -->
  <div class="modal-content"> <!-- Label: Modal content -->
      <span class="close-btn" id="closeModal">&times;</span> <!-- Label: Close button -->
      <h2>Checkout Form</h2>
      <form id="checkoutForm">
          <!-- Checkout form fields -->
          <label for="firstName">First Name:</label>
          <input type="text" id="firstName" name="firstName" required>

          <label for="lastName">Last Name:</label>
          <input type="text" id="lastName" name="lastName" required>

          <label for="email">Email:</label>
          <input type="email" id="email" name="email" required>

          <label for="phone">Phone:</label>
          <input type="text" id="phone" name="phone" required>

          <label for="address">Address:</label>
          <input type="text" id="address" name="address" required>

          <label for="city">City:</label>
          <input type="text" id="city" name="city" required>

          <label for="payment">Payment Method:</label>
          <select id="payment" name="payment" required>
              <option value="credit">Credit Card</option>
              <option value="paypal">PayPal</option>
              <option value="cod">Cash on Delivery</option>
          </select>

          <button type="submit">Submit</button>
      </form>
  </div>
</div>

<!-- Include External JavaScript -->
<script src="checkout.js"></script> <!-- Label: External JavaScript file -->



   <div class="main-container">
       <img src="image1.webp" alt="Image 1" class="gallery-image">
       <img src="/image2.webp" alt="Image 2" class="gallery-image">
       <img src="/image3.webp" alt="Image 3" class="gallery-image">
       <img src="/image4.webp" alt="Image 4" class="gallery-image">
       <img src="/image5.webp" alt="Image 5" class="gallery-image">
       <img src="/image6.webp" alt="Image 6" class="gallery-image">
       <img src="/image7.webp" alt="Image 7" class="gallery-image">
       <img src="/image8.webp" alt="Image 8" class="gallery-image">
  </div>
  
       
  
<footer>
    <div class="footer-container">
      <!-- First div: Input box with a button -->
      <div class="footer-subscribe">
        <input type="email" placeholder="Enter your email" />
        <button>sign up</button>
      </div>
  
      <!-- Second div: Icon with text -->
      <div class="footer-section">
        <i class="fa fa-map-marker"></i>
        <p>Location</p>
      </div>
  
      <!-- Third div: Icon with text -->
      <div class="footer-section">
        <i class="fa-solid fa-truck-fast"></i>
        <p>track</p>
      </div>
  
      <!-- Fourth div: Icon with text --> 
      <div class="footer-section">
        <i class="fa-solid fa-phone"></i>
        <i class="fa fa-envelope"></i>
        <p>Email Us</p>
      </div>
    </div>
  </footer>
  
</body>
</html>
